version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: instapost-postgres
    environment:
      POSTGRES_DB: instapost
      POSTGRES_USER: instapost
      POSTGRES_PASSWORD: ${DB_PASSWORD:-instapost123}
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U instapost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: instapost-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: instapost-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  video-worker:
    build:
      context: .
      dockerfile: Dockerfile.video
    container_name: instapost-video-worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://instapost:${DB_PASSWORD:-instapost123}@postgres:5432/instapost
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin_secret}
      MINIO_USE_SSL: 'false'
      MINIO_BUCKET: instapost-images
      MINIO_PUBLIC_URL: http://localhost:9000
      SCRIPTS_DIR: /app
    volumes:
      - videowork:/tmp/instapost-videos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  videowork:
